<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIR BALANG TRIO RAMADOWN</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
overflow-x:hidden;
}

/* star background */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 120s linear infinite;
z-index:-2;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* lanterns */

.lantern{
position:fixed;
top:-150px;
font-size:40px;
animation:floatLantern 12s linear infinite;
opacity:0.8;
}

@keyframes floatLantern{
0%{transform:translateY(0);}
100%{transform:translateY(120vh);}
}

.l1{left:10%;animation-delay:0s}
.l2{left:30%;animation-delay:4s}
.l3{left:60%;animation-delay:2s}
.l4{left:80%;animation-delay:6s}

/* header */

header{
text-align:center;
padding:60px 20px;
}

header h1{
font-size:42px;
color:gold;
text-shadow:0 0 20px gold;
}

header p{
color:#7CFC00;
}

/* menu */

.menu{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:30px;
}

.card{
background:rgba(0,0,0,0.8);
border:2px solid gold;
padding:25px;
width:200px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
box-shadow:0 0 25px gold;
}

.card h3{
color:#7CFC00;
margin:0;
}

.price{
font-size:24px;
color:gold;
margin-top:10px;
}

/* gallery */

.gallery{
text-align:center;
padding:50px 20px;
}

.gallery h2{
color:gold;
font-size:30px;
margin-bottom:25px;
}

.slider{
width:90%;
max-width:800px;
margin:auto;
overflow:hidden;
border-radius:15px;
border:2px solid gold;
}

.slides{
display:flex;
width:400%;
animation:slide 32s infinite;
}

.slides img{
width:100%;
height:400px;
object-fit:cover;
}

/* pause when hover */

.slider:hover .slides{
animation-play-state:paused;
}

@keyframes slide{

0%{transform:translateX(0);}
20%{transform:translateX(0);}

25%{transform:translateX(-100%);}
45%{transform:translateX(-100%);}

50%{transform:translateX(-200%);}
70%{transform:translateX(-200%);}

75%{transform:translateX(-300%);}
95%{transform:translateX(-300%);}

100%{transform:translateX(0);}

}

/* order */

.order{
text-align:center;
margin:50px;
}

.btn{
background:#25D366;
padding:18px 35px;
color:white;
text-decoration:none;
border-radius:30px;
font-size:20px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* footer */

footer{
text-align:center;
padding:30px;
color:#aaa;
}

</style>

</head>


<body>

<div class="stars"></div>

<div class="lantern l1">🏮</div>
<div class="lantern l2">🏮</div>
<div class="lantern l3">🏮</div>
<div class="lantern l4">🏮</div>


<header>

<h1>🌙 AIR BALANG TRIO RAMADOWN 🌙</h1>
<p>Ramadhan Special Drinks • Terengganu Style</p>

</header>


<section class="menu">

<div class="card">
<h3>🥤 Air Tebu</h3>
<div class="price">RM4</div>
</div>

<div class="card">
<h3>🌸 Air Bandung</h3>
<div class="price">RM3</div>
</div>

<div class="card">
<h3>🌽 Air Jagung</h3>
<div class="price">RM3</div>
</div>

</section>


<section class="gallery">

<h2>📸 Our Stall</h2>

<div class="slider">

<div class="slides">

<img src="images/stall1.jpg">
<img src="images/stall2.jpg">
<img src="images/stall3.jpg">
<img src="images/stall4.jpg">

</div>

</div>

</section>


<div class="order">

<a class="btn" href="https://wa.me/601131402035">
Order on WhatsApp
</a>

</div>


<footer>

<p>📍 Depan Izzama Coconut Shake</p>
<p>Selamat Berbuka Puasa 🌙</p>

</footer>


</body>
</html>
